<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shi Positioning Analyzer • CSE Mastery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <!-- Navbar -->
  <nav class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-3 hover:text-amber-400 transition">
          <span class="text-3xl">🀄</span>
          <h1 class="text-2xl font-bold tracking-tight">CSE Mastery</h1>
        </a>
      </div>
      <div class="flex items-center gap-8">
        <a href="index.html" class="hover:text-amber-400 transition">← Back to Dashboard</a>
        <a href="https://your-gumroad-link.com" target="_blank"
           class="bg-amber-500 hover:bg-amber-400 text-black font-semibold px-6 py-3 rounded-xl transition">
          Get Full Toolkit — $197
        </a>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-5xl font-bold tracking-tighter mb-3">Shi Positioning Analyzer</h1>
    <p class="text-xl text-zinc-400 mb-10">Instant Chinese strategic read of any business situation</p>

    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
      <label class="block text-sm font-medium text-amber-400 mb-3">Describe your current situation</label>
      <textarea id="situationInput" rows="5"
                class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-5 text-lg outline-none resize-none"
                placeholder="Example: My biggest competitor just slashed prices by 30%. Sales are dropping..."></textarea>

      <button onclick="analyzeShi()" 
              class="mt-8 w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-black font-semibold py-6 text-xl rounded-2xl transition">
        Analyze with Chinese Strategy →
      </button>
    </div>

    <!-- Result Area -->
    <div id="resultArea" class="hidden mt-10 bg-zinc-900 border border-amber-400/30 rounded-3xl p-8">
      <div class="flex items-center gap-3 mb-6">
        <div class="text-4xl">🔥</div>
        <h2 class="text-3xl font-semibold">Current Shi (Momentum) Analysis</h2>
      </div>
      
      <div id="shiResult" class="prose prose-invert"></div>

      <div class="mt-10">
        <h3 class="text-xl font-medium mb-4">Recommended Stratagems</h3>
        <div id="recommendedStratagems" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <script src="assets/data/stratagems.json"></script>
  <script src="assets/js/shi-analyzer.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
