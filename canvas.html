<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>36 Stratagems Canvas • CSE Mastery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <!-- Navbar -->
  <nav class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-3 hover:text-amber-400 transition">
          <span class="text-3xl">🀄</span>
          <h1 class="text-2xl font-bold tracking-tight">CSE Mastery</h1>
        </a>
      </div>
      <div class="flex items-center gap-8">
        <a href="index.html" class="hover:text-amber-400 transition">← Back to Dashboard</a>
        <a href="https://lakesidehotel.gumroad.com/l/zrjobh" target="_blank"
           class="bg-amber-500 hover:bg-amber-400 text-black font-semibold px-6 py-3 rounded-xl transition">
          Get Full Toolkit — $147 (Launch Price)
        </a>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <h1 class="text-5xl font-bold tracking-tighter mb-2">36 Stratagems Canvas</h1>
    <p class="text-zinc-400 text-xl mb-8">Find the perfect stratagem for any situation in seconds</p>

    <!-- Controls -->
    <div class="flex flex-wrap gap-4 mb-8">
      <input id="searchInput" 
             type="text" 
             placeholder="Search stratagems or situations... (e.g. negotiation, competitor, crisis)"
             class="flex-1 min-w-[300px] bg-zinc-900 border border-zinc-700 focus:border-amber-400 rounded-2xl px-6 py-4 text-lg outline-none">

      <select id="categoryFilter" class="bg-zinc-900 border border-zinc-700 focus:border-amber-400 rounded-2xl px-6 py-4 text-lg outline-none">
        <option value="">All Categories</option>
        <option value="Preparation">Preparation</option>
        <option value="Attack">Attack</option>
        <option value="Defense">Defense</option>
        <option value="Sacrifice">Sacrifice</option>
        <option value="Escape">Escape</option>
        <option value="Deception">Deception</option>
        <option value="Alliance">Alliance</option>
      </select>

      <button onclick="resetFilters()" 
              class="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium transition">
        Reset
      </button>
    </div>

    <!-- Stratagems Grid -->
    <div id="stratagemsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-auto">
      <div class="p-8">
        <div class="flex justify-between items-start mb-6">
          <div>
            <span id="modalCategory" class="text-xs uppercase tracking-widest text-amber-400"></span>
            <h2 id="modalName" class="text-4xl font-bold mt-1"></h2>
            <p id="modalPinyin" class="text-zinc-400 italic"></p>
          </div>
          <button onclick="closeModal()" class="text-4xl leading-none text-zinc-500 hover:text-white">×</button>
        </div>

        <div class="prose prose-invert max-w-none">
          <p id="modalDescription" class="text-lg"></p>
          <div class="my-8 p-6 bg-zinc-800 rounded-2xl">
            <strong class="block mb-3 text-amber-400">Real-world Example:</strong>
            <p id="modalExample" class="italic"></p>
          </div>
        </div>

        <!-- Quick Apply -->
        <div class="mt-8 border border-zinc-700 rounded-2xl p-6">
          <label class="block text-sm text-zinc-400 mb-3">Apply to your situation (type below)</label>
          <textarea id="situationInput" rows="3"
                    class="w-full bg-black border border-zinc-700 rounded-2xl px-5 py-4 text-white outline-none"
                    placeholder="E.g. My competitor just dropped prices..."></textarea>
          <button onclick="applyStratagem()" 
                  class="mt-4 w-full bg-amber-500 hover:bg-amber-400 text-black font-semibold py-4 rounded-2xl transition">
            Get Personalized Move →
          </button>
          <div id="applyResult" class="mt-6 text-sm hidden"></div>
        </div>

        <button onclick="closeModal()" 
                class="mt-8 text-zinc-400 hover:text-white w-full py-3">Close</button>
      </div>
    </div>
  </div>

  <script src="assets/data/stratagems.json"></script>
  <script src="assets/js/canvas.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
